<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOQ Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(to bottom, #f7a7c0, #9cd9ed);
        }
        form {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        #square {
    background-color: #ffffff56;
    border-radius: 10px;
    padding: 10px;
    margin-right: 20px;
    width: 200;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    backdrop-filter: blur(5px); /* Agregar desenfoque */
    box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1); /* Agregar sombra */

}
        input[type="number"] {
            width: 300px;
            padding: 5px;
            margin-bottom: 10px;
            background-color: #ffffffae;
            border: 15px;
            border-color: rgb(255, 255, 255);
            text-align: center;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            border-bottom: 1px solid #ccc;
        }
        button {
            background-color: #ffffff90;
            color: rgb(0, 0, 0);
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
            border-radius: 5px;
            border-color: #000000;
            backdrop-filter: blur();
        }
        button:hover {
            background-color: #00000090;
            color: rgb(255, 255, 255);
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            border-color: #000000;
            backdrop-filter: blur();
        }
        #result {
            margin-top: 20px;
            background-color: #ffffff56;
            border-radius: 10px;
            padding: 10px;
            width: 300px;
            backdrop-filter: blur(5px);
            display: none;
        }

        #demand
        {
            margin-left: 20px;
            margin-right: 20px;
        }

 @media screen and (max-width: 600px) {
  /* Estilos para dispositivos móviles con un ancho máximo de 600px */
  #square {
    width: 300x;
    margin-right: 0; /* Eliminar el margen derecho */
    box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1); /* Agregar sombra */
  }
}
    </style>
</head>
<body>
    <div id="square">
    <h1>EOQ</h1>
    <form id="eoqForm">
        <label for="demand">Demanda diaria (D):</label>
        <input type="number" id="demand" step="any" required><br>
        <label for="orderCost">Costos del pedido (S):</label>
        <input type="number" id="orderCost" step="any" required><br>
        <label for="holdingCost">Costos de mantenimiento (H):</label>
        <input type="number" id="holdingCost" step="any" required><br>
        <button type="button" onclick="calculateEOQ()">Calcular EOQ</button>
    </div>
    </form>
    <div id="result"></div>

    <script>
        function calculateEOQ() {
            var demand = parseFloat(document.getElementById("demand").value);
            var demandAnual = demand * 365; // Calcula la demanda anual
            var orderCost = parseFloat(document.getElementById("orderCost").value);
            var holdingCost = parseFloat(document.getElementById("holdingCost").value);
    
            // Calcular EOQ
            var eoq = Math.sqrt((2 * (demandAnual * orderCost)) / holdingCost);
    
            // Redondear a un número entero (hacia abajo)
            eoq = Math.floor(eoq);
    
            // Mostrar resultado
            document.getElementById("result").innerHTML = "<h2>Resultado</h2><p>El resultado de EOQ es de: " + eoq + " unidades</p>";
            document.getElementById("result").style.display = 'block'; // Mostrar el contenedor del resultado
        }
    </script>
</body>
</html>
