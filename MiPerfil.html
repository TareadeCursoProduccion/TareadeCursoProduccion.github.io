<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta de PedidosYa</title>
    <link rel="stylesheet" href="CSS/MiPerfil.css">
</head>
<body>
    <header class="header-principal">
        <div class="logo">
            <img src="assets/image0.png" id = 'logo' alt="Mini-Markett Logo">
            <h1>Mini-Markett</h1>

    </header>
    <div class="container">
        <aside class="sidebar">
            <div class="profile">
                <img src="assets/Dieri.png" alt="Foto de perfil">
                <h2>Dierish Rojas Corrales</h2>
                <p>pokemondarc@yahoo.es</p>

                <button id="inicio">Inicio</button>
            </div>
        </aside>
        <main class="content">
            <section class="account-section">
                <h1>Mi cuenta</h1>
                <div class="buttons">
                    <div class="section">
                        <span>Perfil</span>
                        <button id="personal-info">Información personal</button>
                    </div>
                    <div class="section">
                        <span>Soporte</span>
                        <button id="terms">Políticas de seguridad</button>
                        <button id="privacy">Políticas de privacidad</button>
                    </div>
                    <div class="section">
                        <button id="logout">Cerrar sesión</button> 
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
