<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Mantenimiento Correctivo</title>
    <style>
 body {
    font-family: Arial, sans-serif;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: linear-gradient(to bottom, #f7a7c0, #9cd9ed);
}

h1 {
    font-family: 'Varela Round', Arial, sans-serif;
    margin-top: 20px;
  
}

form {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

label {
    display: block;
    margin-bottom: 5px;
}

input[type="number"],
select {
    width: 300px;
    padding: 5px;
    margin-bottom: 10px;
}

#mtbfOption {
    background-color: #ffffffae;
    border: 15px;
    border-color: rgb(255, 255, 255);
  
    text-align: center;
    
    width: 300px; /* Ancho aumentado a 300px */

    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
    border-bottom: 1px solid #ccc; /* Agregar borde inferior */
}

input {
    background-color: #ffffffae;
    border: 15px;
    border-color: rgb(255, 255, 255);
  
    text-align: center;
    
    width: 300px; /* Ancho aumentado a 300px */
    padding: 10px; /* Ajuste del relleno para que se vea bien */
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
    border-bottom: 1px solid #ccc; /* Agregar borde inferior */
}

button {
    background-color: #ffffff90;
 
    color: rgb(0, 0, 0);
    padding: 10px 20px;
    text-align: center;
    text-decoration: none;
    font-size: 16px;
    cursor: pointer;
    
    border-radius: 5px;
    border-color: #000000;
    backdrop-filter: blur();
}

button:hover {
    background-color: #00000090;
 
 color: rgb(255, 255, 255);
 padding: 10px 20px;
 text-align: center;
 text-decoration: none;
 font-size: 16px;
 cursor: pointer;
 
 border-radius: 5px;
 border-color: #000000;
 backdrop-filter: blur();
}

#square {
    background-color: #ffffff56;
    border-radius: 10px;
    padding: 10px;
    margin-right: 20px;
    width: 200%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    backdrop-filter: blur(5px); /* Agregar desenfoque */
    box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1); /* Agregar sombra */

}

#resultContainer {
    background-color: #ffffff56;
    border-radius: 10px;
    padding: 10px;
    margin-top: 20px;
    width: 300px;
    backdrop-filter: blur(5px); /* Agregar desenfoque */
    display: none; /* Ocultar inicialmente */
}

#result {
    margin-top: 20px;
}

#mtbfPercentageDiv {
    display: none;
    /* Ocultar inicialmente */
}

#mtbfOptionDiv {
    display: flex;
    justify-content: center;
    align-items: center;
}

@media screen and (max-width: 600px) {
  /* Estilos para dispositivos móviles con un ancho máximo de 600px */
  #square {
    width: 350px;
    margin-right: 0; /* Eliminar el margen derecho */
    box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1); /* Agregar sombra */
  }
}
    </style>
</head>
<body>
    <form id="maintenanceForm">
        <div id="square">
            <h1>Calculadora de Mantenimiento Correctivo</h1>
        <div>
            <label for="hora">Horas de Funcionamiento (H):</label>
            <input type="number" id="hora" required>
        </div>
        <div id="mtbfValueDiv">
            <label for="mtbf">MTBF:</label>
            <input type="number" id="mtbf" name="mtbf" required>
        </div>
        <div id="mtbfPercentageDiv">
            <label for="mtbfPercentageValue">MTBF (% de las horas):</label>
            <input type="number" id="mtbfPercentageValue" name="mtbfPercentageValue">
        </div>
        <div id="mtbfOptionDiv">
            <select id="mtbfOption" onchange="toggleMTBFInput()">
                <option value="value">MTBF (en horas)</option>
                <option value="percentage">MTBF (% de las horas)</option>
            </select>
        </div>
        <div>
            <label for="duracionTareas">Duración de las Tareas (en horas):</label>
            <input type="number" id="duracionTareas" required>
        </div>
        <div>
            <label for="costoHora">Costo por Hora de Trabajo:</label>
            <input type="number" id="costoHora" required>
        </div>
        <div>
            <label for="repuestos">Repuestos:</label>
            <input type="number" id="repuestos" required>
        </div>
        <div>
            <label for="costoTareasOperacionales">Costos de Tareas Operacionales:</label>
            <input type="number" id="costoTareasOperacionales" required>
        </div>
        <div>
            <label for="retrasoLogistico">Retraso Logístico:</label>
            <input type="number" id="retrasoLogistico" required>
        </div>
        <div>
            <label for="CostoParada">Costo Unitario por Parada:</label>
            <input type="number" id="CostoParada" required>
        </div>
        <div>
            <label for="CostoFallaUnica">Costo de Fallas de Vez Única:</label>
            <input type="number" id="CostoFallaUnica" required>
        </div>
        
        <button type="submit">Calcular</button>
    </div>
    </form>
    
    <div id="resultContainer">
        <div id="result"></div>
    </div>
    
    <script>
        function toggleMTBFInput() {
            var mtbfOption = document.getElementById("mtbfOption").value;
            var mtbfValueDiv = document.getElementById("mtbfValueDiv");
            var mtbfPercentageDiv = document.getElementById("mtbfPercentageDiv");

            if (mtbfOption === "percentage") {
                mtbfValueDiv.style.display = "none";
                mtbfPercentageDiv.style.display = "block";
            } else {
                mtbfValueDiv.style.display = "block";
                mtbfPercentageDiv.style.display = "none";
            }
        }

        document.getElementById('maintenanceForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // Obtener los valores del formulario
            let hora = parseFloat(document.getElementById('hora').value);
            let mtbfOption = document.getElementById('mtbfOption').value;
            let mtbf = 0;

            if (mtbfOption === 'value') {
                mtbf = parseFloat(document.getElementById('mtbf').value);
            } else {
                var mtbfPercentageValue = parseFloat(document.getElementById('mtbfPercentageValue').value);
                mtbf = (mtbfPercentageValue / 100) * hora;
            }

            let duracionTareas = parseFloat(document.getElementById('duracionTareas').value);
            let costoHora = parseFloat(document.getElementById('costoHora').value);
            let repuestos = parseFloat(document.getElementById('repuestos').value);
            let costoTareasOperacionales = parseFloat(document.getElementById('costoTareasOperacionales').value);
            let retrasoLogistico = parseFloat(document.getElementById('retrasoLogistico').value);
            let costoParada = parseFloat(document.getElementById('CostoParada').value);
            let costoFallaUnica = parseFloat(document.getElementById('CostoFallaUnica').value);
            
            // Calcular el mantenimiento correctivo
            let numeroFallas = Math.floor(hora / mtbf); // Redondear hacia abajo
            let costoMantenimientoCorrectivo = numeroFallas * (
                (duracionTareas * costoHora + repuestos + costoTareasOperacionales + retrasoLogistico) + 
                (duracionTareas * costoParada + costoFallaUnica)
            );
            
            // Mostrar el resultado
            var resultContainer = document.getElementById('resultContainer');
            var resultDiv = document.getElementById('result');
            resultDiv.innerHTML = "<h2>Numero de Fallas: " + numeroFallas + "</h2>";
            resultDiv.innerHTML += "<h2>Costo de Mantenimiento Correctivo: $" + costoMantenimientoCorrectivo.toFixed(2) + "</h2>";
            resultContainer.style.display = 'block'; // Mostrar el contenedor del resultado
        });
    </script>
</body>
</html>
