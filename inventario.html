<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/Inventario.css">
    

</head>
<body>
    <div class="sidebar">
       
        <div class="product-actions">
            <button class="image-buton">
                <img src="assets/Backgrounddashboard.png" alt="Logo">
            </button>
        </div> 
        <div class="product-actions">
            <button class="image-buton">
                <img src="assets/ImageInventario.png" alt="Logo">
            </button>
        </div> 
        <div class="product-actions">
            <button class="image-buton">
                <img src="assets/IconCategory.png" alt="Logo">
            </button>
        </div> 
    </div>
    <div class="main-content">
        <div class="header">
            <h1>Inventario</h1>
            <input type="text" placeholder="Buscar">
        </div>
        <div class="product-list">
            <div class="header-row">
                <span>3 Productos</span>
                <span>Cantidad</span>
                <span>Coste</span>
                <span>Precio</span>
            </div>
            <div class="product-item">
                <div class="product-details">
                    <img src="assets/Image placeholder.png" alt="Producto 1">
                    <span class="product-name">Producto 1</span>
                    <span class="product-quantity">8</span>
                    <span class="product-cost">120</span>
                    <span class="product-price">C$150</span>
                </div>
                <div class="product-actions">
                    <button class="image-button">
                        <img src="assets/pencil.png" alt="Editar">
                    </button>
                    <button class="image-button">
                        <img src="assets/trash.png" alt="Eliminar">
                    </button>
                </div>
            </div>
            <div class="product-item">
                <div class="product-details">
                    <img src="assets/Image placeholder.png" alt="Producto 1">
                    <span class="product-name">Producto 1</span>
                    <span class="product-quantity">8</span>
                    <span class="product-cost">25</span>
                    <span class="product-price">C$30</span>
                </div>
                <div class="product-actions">
                    <button class="image-button">
                        <img src="assets/pencil.png" alt="Editar">
                    </button>
                    <button class="image-button">
                        <img src="assets/trash.png" alt="Eliminar">
                    </button>
                </div>
            </div>
            <div class="product-item">
                <div class="product-details">
                    <img src="assets/Image placeholder.png" alt="Producto 1">
                    <span class="product-name">Producto 1</span>
                    <span class="product-quantity">8</span>
                    <span class="product-cost">80</span>
                    <span class="product-price">C$95</span>
                </div>
                <div class="product-actions">
                    <button class="image-button">
                        <img src="assets/pencil.png" alt="Editar">
                    </button>
                    <button class="image-button">
                        <img src="assets/trash.png" alt="Eliminar">
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
