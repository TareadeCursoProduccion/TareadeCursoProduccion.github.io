<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario y Categorías</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="CSS/Inventario.css">
</head>
<body>
    <div class="sidebar">
        <div class="product-actions">
            <button class="image-buton" id="dashboardButton">
                <img src="assets/Backgrounddashboard.png" alt="Logo">
            </button>
        </div> 
        <div class="product-actions">
            <button class="image-buton" id="inventoryButton">
                <img src="assets/ImageInventario.png" alt="Logo">
            </button>
        </div> 
        <div class="product-actions">
            <button class="image-buton" id="categoryButton">
                <img src="assets/IconCategory.png" alt="Logo">
            </button>
        </div> 
    </div>
    <div class="main-content">
        <!-- Contenedor de Inventario -->
        <div id="inventorySection">
            <div class="header">
                <h1>Inventario</h1>
                <input type="text" placeholder="Buscar">
            </div>
            <div class="product-list">
                <div class="header-row">
                    <span>3 Productos</span>
                    <span>Cantidad</span>
                    <span>Coste</span>
                    <span>Precio</span>
                </div>
                <div class="product-item">
                    <div class="product-details">
                        <img src="assets/Image placeholder.png" alt="Producto 1">
                        <span class="product-name">Producto 1</span>
                        <span class="product-quantity">8</span>
                        <span class="product-cost">120</span>
                        <span class="product-price">C$150</span>
                    </div>
                    <div class="product-actions">
                        <button class="image-button">
                            <img src="assets/pencil.png" alt="Editar">
                        </button>
                        <button class="image-button">
                            <img src="assets/trash.png" alt="Eliminar">
                        </button>
                    </div>
                </div>
                <div class="product-item">
                    <div class="product-details">
                        <img src="assets/Image placeholder.png" alt="Producto 1">
                        <span class="product-name">Producto 1</span>
                        <span class="product-quantity">8</span>
                        <span class="product-cost">25</span>
                        <span class="product-price">C$30</span>
                    </div>
                    <div class="product-actions">
                        <button class="image-button">
                            <img src="assets/pencil.png" alt="Editar">
                        </button>
                        <button class="image-button">
                            <img src="assets/trash.png" alt="Eliminar">
                        </button>
                    </div>
                </div>
                <div class="product-item">
                    <div class="product-details">
                        <img src="assets/Image placeholder.png" alt="Producto 1">
                        <span class="product-name">Producto 1</span>
                        <span class="product-quantity">8</span>
                        <span class="product-cost">80</span>
                        <span class="product-price">C$95</span>
                    </div>
                    <div class="product-actions">
                        <button class="image-button">
                            <img src="assets/pencil.png" alt="Editar">
                        </button>
                        <button class="image-button">
                            <img src="assets/trash.png" alt="Eliminar">
                        </button>
                    </div>
                </div>
            </div>
            <button class="add-button">+</button>
        </div>
        <!-- Contenedor de Categorías -->
        <div id="categorySection" style="display:none;">
            <div class="header">
                <h1>Categorías</h1>
                <input type="text" placeholder="Buscar">
            </div>
            <div class="product-list">
                <div class="header-row">
                    <span style="text-align: start;">3 Categorías</span>
                </div>
                <div class="product-item">
                    <div class="product-details">
                        <img src="assets/Image placeholder.png" alt="Categoría 1">
                        <span class="product-name">Categoría 1</span>
                    </div>
                    <div class="product-actions">
                        <button class="image-button">
                            <img src="assets/pencil.png" alt="Editar">
                        </button>
                        <button class="image-button">
                            <img src="assets/trash.png" alt="Eliminar">
                        </button>
                    </div>
                </div>
                <div class="product-item">
                    <div class="product-details">
                        <img src="assets/Image placeholder.png" alt="Categoría 2">
                        <span class="product-name">Categoría 2</span>
                    </div>
                    <div class="product-actions">
                        <button class="image-button">
                            <img src="assets/pencil.png" alt="Editar">
                        </button>
                        <button class="image-button">
                            <img src="assets/trash.png" alt="Eliminar">
                        </button>
                    </div>
                </div>
                <div class="product-item">
                    <div class="product-details">
                        <img src="assets/Image placeholder.png" alt="Categoría 3">
                        <span class="product-name">Categoría 3</span>
                    </div>
                    <div class="product-actions">
                        <button class="image-button">
                            <img src="assets/pencil.png" alt="Editar">
                        </button>
                        <button class="image-button">
                            <img src="assets/trash.png" alt="Eliminar">
                        </button>
                    </div>
                </div>
            </div>
            <button class="add-button" id="openModalButton">+</button>
        </div>
    </div>
    
    <!-- Modal para Crear Categoría -->
    <div class="modal" id="createCategoryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Crear Categoría</h2>
                <button class="close-button" id="closeModalButton">✖</button>
            </div>
            <div class="modal-body">
                <img src="assets/Image placeholder.png" alt="Agregar Imagen" id="imageDisplay">
                <canvas id="canvas" style="display: none;"></canvas>
                <!-- <span>Agregar Imagen</span> -->
                <input type="file" id="fileInput" accept="image/*">
                <label for="fileInput" class="custom-file-upload">Agregar Imagen</label>
                <input type="text" placeholder="Nombre">
            </div>
            <div class="modal-footer">
                <button class="create-button"><i class="fas fa-plus"></i> Crear Categoría</button>
            </div>
        </div>
    </div>
    <script src="JS/inventario.js"></script>
</body>
</html>
