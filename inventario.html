<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | Mini-Markett</title>
</head>
<body>
    <nav class="navbar" id="navbar">
        <img src="assets/image0.png" with="50px" height="50px">
        <h2>Mini-Markett</h2>
        
            <div>
                <div class="img">imagendeperfil</div>
                <div class="name">Mi perfil</div>
                <img src="" alt="">
                <!-- flecha apuntando abajo -->
            </div>
            <div>
                <ul>
                    <li class="nav__items">
                        <a href="#" class="nav__links">
                            <img src="" alt="">
                            <span class="title iniciarSesion">Iniciar Sesion</span>
                        </a>
                    </li>
                    <li class="nav__items">
                        <a href="#" class="nav__links">
                            <img src="" alt="">
                            <span class="title Registrarse">Registrarse</span>
                        </a>
                    </li>
                    <li class="nav__items">
                        <a href="#" class="nav__links">
                            <img src="" alt="">
                            <span class="title QuienesSomos">Quienes Somos</span>
                        </a>
                    </li>
                    <li class="nav__items">
                        <a href="#" class="nav__links">
                            <img src="" alt="">
                            <span class="title MisionVision">Mision y Vision</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    <nav>

    <div class="Main">
        <!-- esta parte de aca es una pagina aparte, que al darle click te manda a este form o al dashboard -->
        <div class="weadeallado">
            <img src="assets/Backgrounddashboard.png" with="50px" height="50px">
            <img src="assets/ImageInventario.png" with="50px" height="50px">
        </div>
        <div class="Contenido">
            <nav class="navbar-inv">
                <h2>Inventario</h2>
                <input data-type="name" type="text" id="searchInput" class="search-inv" autocomplete="off" spellcheck="false" dir="auto">
            </nav>

            <section class="product__contentblock">
                <div class="Titles">
                    <span>Productos</span>
                    <span>Cantidad</span>
                    <span>Coste</span>
                    <span>Precio</span>
                </div>

                <div class="product-details">
                    <!-- ejemplo de lista-->
                    <div onclick="window.location.href=''">
                        <span class="ProductName" id="nombreproducto" onclick="window.location.href=''">Producto1</span>
                        <span class="ProductCategory" id="categoriaproducto" onclick="window.location.href=''">categoria1</span>
                        <span class="ProductQuantity" id="cantidadproducto" onclick="window.location.href=''">8</span>
                        <span class="ProductCost" id="costeproducto" onclick="window.location.href=''">120</span>
                        <span class="ProductPrice" id="precioproducto" onclick="window.location.href=''">150</span>
                        <button class="btn-Update">+-</button>
                        <button class="btn-Delete">+</button>
                    </div>
                    <div onclick="window.location.href=''">
                        <span class="ProductName" id="nombreproducto" onclick="window.location.href=''">Producto2</span>
                        <span class="ProductCategory" id="categoriaproducto" onclick="window.location.href=''">categoria2</span>
                        <span class="ProductQuantity" id="cantidadproducto" onclick="window.location.href=''">8</span>
                        <span class="ProductCost" id="costeproducto" onclick="window.location.href=''">120</span>
                        <span class="ProductPrice" id="precioproducto" onclick="window.location.href=''">150</span>
                        <button class="btn-Update">+-</button>
                        <button class="btn-Delete">+</button>
                    </div>
                </div>
            </section>

            <button class="btn-add">+</button>
        </div>
    </div>

    <div class="createProduct__contentblock">
        <!-- style="display: none;" -->
        <div class="pokedex-pokemon__title">
            <span class="createProduct">Crear Producto</span>
            <img src="" alt="">
            <button class="btn-AddImage">Agregar Imagen</button>
        </div>
        <button class="btn-Close">*</button>
        <section class="information container">
            <div class="product-Name">
                <h3>Nombre</h3>
                <input data-type="name" type="text" id="nameInput" class="product-inv" autocomplete="off" spellcheck="false" dir="auto">
            </div>
            <div class="product-Category">
                <h3>Categoria</h3>
                <input data-type="name" type="text" id="categoryInput" class="product-inv" autocomplete="off" spellcheck="false" dir="auto">
            </div>
            <div class="product-Quantity">
                <h3>Cantidad</h3>
                <input data-type="name" type="text" id="quantityInput" class="product-inv" autocomplete="off" spellcheck="false" dir="auto">
            </div>
            <div class="product-Cost">
                <h3>Coste</h3>
                <input data-type="name" type="text" id="costInput" class="product-inv" autocomplete="off" spellcheck="false" dir="auto">
            </div>
            <div class="product-price">
                <h3>Precio</h3>
                <input data-type="name" type="text" id="priceInput" class="product-inv" autocomplete="off" spellcheck="false" dir="auto">
            </div>

            <button class="btn-createProduct">+</button>
        </section>
    </div>
</body>
</html>
